name: Pheonix Test Automation workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 14
      uses: actions/setup-java@v4
      with:
        java-version: '14'
        distribution: 'temurin'
        cache: maven
    - name: Execute maven test
      run: mvn test -Dsuitexmlfile=testng.xml -Denv=qa
