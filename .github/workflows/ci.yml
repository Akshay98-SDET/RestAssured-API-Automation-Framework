name: Pheonix Test Automation workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule: 
    - cron: "30 18 * * *"
  workflow_dispatch:
    inputs:
      env:
       description: "Enviorment"
       type: choice
       options: [qa, dev, uat]
       default: qa
       required: true
      suitexmlfile:
       description: "TestNG XML file"
       type: choice
       options: [testng.xml, smoke.xml, regression.xml]
       default: testng.xml
       required: true

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Execute maven test
      run: mvn test -Dsuitexmlfile="${{ github.event.inputs.suitexmlfile }}" -Denv="${{ github.event.inputs.env }}"

    - name: Upload a Build Artifact
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: surefire report
        path: target/surefire-reports/
        retention-days: 10
